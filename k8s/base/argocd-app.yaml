apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llmgateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/krishnarajt/llmgateway
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: llmgateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
