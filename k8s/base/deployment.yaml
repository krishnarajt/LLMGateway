apiVersion: apps/v1
kind: Deployment
metadata:
  name: llmgateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llmgateway
  template:
    metadata:
      labels:
        app: llmgateway
    spec:
      containers:
        - name: app
          image: ghcr.io/krishnarajt/llmgateway:git-1aeef52f59db0c1d96a49ebae7d5440211b8e9bb
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http

          envFrom:
            - secretRef:
                name: llmgateway-env

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
